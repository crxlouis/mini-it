<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBG IT & EVENTSOLUTION</title>
    <!-- Google Fonts & FontAwesome für Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Tailwind CSS für modernes Styling -->
    <script src="https://jsdelivr.net"></script>
    <!-- React & Babel laden, um den Code direkt im Browser auszuführen -->
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="bg-[#f0f4f8] text-[#0f172a]">

    <!-- Hier wird die App injiziert -->
    <div id="root"></div>

    <!-- Ab hier läuft dein angepasster Code -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── DEFAULT CONFIG ───────────────────────────────────────────────────
        const DEFAULT_CONFIG = {
          siteName: "HBG IT & EVENTSOLUTION",
          siteTagline: "Dein internes Portal für IT-Lösungen und Eventmanagement",
          heroSubtitle: "Schülerfirma • HBG Dortmund",
          noTasksMessage: "Zurzeit wurden Ihnen keine Aufgaben zugeteilt. Genießen Sie die freie Zeit! 🎉",
          logo: null,
          theme: {
            navBg: "#0a0f1e",
            navText: "#94a3b8",
            navActive: "#38bdf8",
            accent: "#38bdf8",
            accentSecondary: "#818cf8",
            heroBg1: "#0a0f1e",
            heroBg2: "#0f2044",
            bodyBg: "#f0f4f8",
            cardBg: "#ffffff",
            textPrimary: "#0f172a",
            textSecondary: "#64748b",
          },
          navItems: [
            { id: "home", label: "🏠 Startseite", type: "internal", target: "home", roles: [] },
            { id: "ipad", label: "📱 iPad", type: "internal", target: "ipad", roles: [] },
            { id: "kalender", label: "📆 Kalender", type: "internal", target: "kalender", roles: [] },
            { id: "faq", label: "❓ FAQ", type: "internal", target: "faq", roles: [] },
            { id: "benutzer", label: "👤 Mein Konto", type: "internal", target: "benutzer", roles: [] },
          ],
        };

        const DEFAULT_ROLES = [
          { id: 1, name: "Administrator", permissions: ["admin_panel","manage_users","edit_pages","manage_news","manage_faq","view_all","manage_calendar","manage_tasks"] },
          { id: 2, name: "Mitarbeiter", permissions: ["view_all"] }
        ];

        // HIER IST DEIN NEUER STANDARD-BENUTZER LOUIS HINTERLEGT
        const DEFAULT_USERS = [
          { id: 1, username: "louis", passwordHash: "louis", role: "Administrator", email: "louis@hbg-it.de", firstName: "Louis", lastName: "Mitarbeiter", classOrCode: "IT", active: true },
          { id: 2, username: "admin", passwordHash: "admin123", role: "Administrator", email: "admin@hbg-it.de", firstName: "Max", lastName: "Mustermann", classOrCode: "Admin", active: true }
        ];

        const DEFAULT_NEWS = [
          { id: 1, title: "🎉 Willkommen bei HBG IT & EVENTSOLUTION!", content: "Wir sind gestartet! Hier findet ihr alle wichtigen Informationen rund um unsere Schülerfirma. Viel Spaß auf der neuen Plattform!", date: "2026-06-07" },
        ];

        const DEFAULT_FAQ = [
          { id: 1, question: "📧 Wie kann ich den IT-Support kontaktieren?", answer: "Schreibe uns eine E-Mail an support@hbg-it.de oder komm persönlich in Raum 214." }
        ];

        // ─── HAUPT-KOMPONENTE ───────────────────────────────────────────────────
        function App() {
          const [user, setUser] = useState(() => {
            const saved = localStorage.getItem("current_user");
            return saved ? JSON.parse(saved) : null;
          });
          const [users, setUsers] = useState(() => {
            const saved = localStorage.getItem("platform_users");
            return saved ? JSON.parse(saved) : DEFAULT_USERS;
          });
          const [news, setNews] = useState(DEFAULT_NEWS);
          const [faqs, setFaqs] = useState(DEFAULT_FAQ);
          const [currentTab, setCurrentTab] = useState("home");
          
          // Login-Formular-Daten
          const [usernameInput, setUsernameInput] = useState("");
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");

          // Profil bearbeiten-Daten
          const [newPassword, setNewPassword] = useState("");
          const [profileMessage, setProfileMessage] = useState("");

          // Neuer Benutzer-Daten (Admin-Panel)
          const [newUsername, setNewUsername] = useState("");
          const [newPasswordAdmin, setNewPasswordAdmin] = useState("");
          const [newRole, setNewRole] = useState("Mitarbeiter");

          useEffect(() => {
            localStorage.setItem("platform_users", JSON.stringify(users));
          }, [users]);

          const handleLogin = (e) => {
            e.preventDefault();
            const foundUser = users.find(u => u.username.toLowerCase() === usernameInput.toLowerCase() && u.passwordHash === passwordInput && u.active);
            if (foundUser) {
              setUser(foundUser);
              localStorage.setItem("current_user", JSON.stringify(foundUser));
              setLoginError("");
            } else {
              setLoginError("❌ Benutzername oder Passwort falsch/inaktiv.");
            }
          };

          const handleLogout = () => {
            setUser(null);
            localStorage.removeItem("current_user");
            setCurrentTab("home");
          };

          const handlePasswordChange = (e) => {
            e.preventDefault();
            if(!newPassword) return;
            const updatedUsers = users.map(u => u.id === user.id ? { ...u, passwordHash: newPassword } : u);
            setUsers(updatedUsers);
            setUser({ ...user, passwordHash: newPassword });
            setNewPassword("");
            setProfileMessage("✅ Passwort erfolgreich geändert!");
            setTimeout(() => setProfileMessage(""), 3000);
          };

          const handleCreateUser = (e) => {
            e.preventDefault();
            if(!newUsername || !newPasswordAdmin) return;
            const newUserObj = {
              id: users.length + 1,
              username: newUsername,
              passwordHash: newPasswordAdmin,
              role: newRole,
              email: `${newUsername}@hbg-it.de`,
              firstName: newUsername,
              lastName: "User",
              classOrCode: "Standard",
              active: true
            };
            setUsers([...users, newUserObj]);
            setNewUsername("");
            setNewPasswordAdmin("");
            alert(`Mitarbeiter "${newUsername}" wurde erfolgreich angelegt!`);
          };

          // ─── LOGIN-OBERFLÄCHE ───────────────────────────────────────────────
          if (!user) {
            return (
              <div class="fixed inset-0 bg-gradient-to-br from-[#0a0f1e] to-[#0f2044] flex items-center justify-center p-4">
                <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md animate-fade-in">
                  <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-[#38bdf8] to-[#818cf8] flex items-center justify-center text-white text-2xl font-bold">⚡</div>
                    <div>
                      <h1 class="text-xl font-extrabold text-[#0f172a]">{DEFAULT_CONFIG.siteName}</h1>
                      <p class="text-xs text-gray-500">Mitarbeiter-Portal</p>
                    </div>
                  </div>
                  <h2 class="text-lg font-bold mb-4 text-gray-800">🔐 Portal-Anmeldung</h2>
                  <form onSubmit={handleLogin} class="space-y-4">
                    <div>
                      <label class="block text-xs font-semibold text-gray-600 mb-1">BENUTZERNAME</label>
                      <input type="text" value={usernameInput} onChange={e => setUsernameInput(e.target.value)} class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#38bdf8]" placeholder="z.B. louis" required />
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-gray-600 mb-1">PASSWORT</label>
                      <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#38bdf8]" placeholder="••••••" required />
                    </div>
                    {loginError && <p class="text-sm text-red-500 font-medium">{loginError}</p>}
                    <button type="submit" class="w-full py-2 bg-[#38bdf8] hover:bg-[#0284c7] text-white font-bold rounded-lg transition shadow-md">Anmelden</button>
                  </form>
                  <p class="text-center text-xs text-gray-400 mt-6">Tipp zum Testen: Benutzer: <span class="font-mono text-gray-600">louis</span> | Passwort: <span class="font-mono text-gray-600">louis</span></p>
                </div>
              </div>
            );
          }

          // ─── PLATTFORM-OBERFLÄCHE (EINGELOGGT) ──────────────────────────────
          return (
            <div class="min-h-screen flex flex-col">
